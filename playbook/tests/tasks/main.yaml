---
- name: Resolve DOCKER_HOST
  ansible.builtin.set_fact:
    resolved_docker_host: "{{ lookup('env', 'DOCKER_HOST') | default('unix:///var/run/docker.sock', true) }}"

- name: Build and push docker image
  community.docker.docker_image:
    name: "ui_tests"
    tag: "latest"
    repository: "localhost:5005/ui_tests"
    source: build
    build:
      path: "/root/jenkins/workspace/ui_tests/"
      dockerfile: Dockerfile.ui_tests
    push: yes
    docker_host: "{{ resolved_docker_host }}"

- name: Running UI tests
  community.docker.docker_container:
    name: ui_tests
    image: "localhost:5005/ui_tests:latest"
    pull: true
    detach: false
    auto_remove: false
    network_mode: host
    env:
      BROWSER: "{{ browser }}"
      BASE_URL: "{{ base_url }}"
    output_logs: true
    docker_host: "{{ resolved_docker_host }}"
  register: container_result